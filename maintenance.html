<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Under Maintenance</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f0f1a;
      color: #AFA9EC;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #6e6e8a;
      font-size: 1.1rem;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid #AFA9EC;
      color: #AFA9EC;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #AFA9EC;
      color: #0f0f1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚧 Under Maintenance</h1>
    <p>My portfolio is currently being updated.</p>
    <p>It will be back soon, better than ever 👨‍💻</p>

    <a href="https://github.com/MarcossSantoss" class="btn">
      Visit my GitHub
    </a>
  </div>
</body>
</html>
