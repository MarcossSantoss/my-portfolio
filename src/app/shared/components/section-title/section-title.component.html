<div class="section-title">
  <span class="overline" *ngIf="overline">{{ overline }}</span>
  <h2 class="title">{{ title }}</h2>
  <p class="subtitle" *ngIf="subtitle">{{ subtitle }}</p>
  <div class="divider">
    <div class="line"></div>
    <div class="dot"></div>
    <div class="line short"></div>
  </div>
</div>
