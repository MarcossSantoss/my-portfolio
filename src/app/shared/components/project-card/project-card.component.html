<div class="card" [class.is-hovered]="hovered()" (mouseenter)="onEnter()" (mouseleave)="onLeave()" (click)="openModal()"
  role="button" tabindex="0" [attr.aria-label]="'Ver detalhes de ' + project.title" (keydown.enter)="openModal()"
  (keydown.space)="openModal()">

  <div class="card-media">

    <img class="card-thumb" [src]="project.thumbnail" [alt]="project.title" loading="lazy" />

    <img *ngIf="isGif" class="card-preview" [src]="project.preview" [alt]="project.title + ' preview'"
      aria-hidden="true" />

    <video #videoRef class="card-preview" [style.display]="isVideo ? 'block' : 'none'"
      [src]="isVideo ? project.preview : ''" muted loop playsinline preload="auto" aria-hidden="true"></video>

    <div class="card-gradient"></div>
  </div>

  <div class="card-idle-info" [class.hidden]="hovered()">
    <span class="category-pill">{{ project.category }}</span>
    <p class="idle-title">{{ project.title }}</p>
  </div>

</div>
