<div
  class="card"
  [class.is-hovered]="hovered()"
  (mouseenter)="onEnter()"
  (mouseleave)="onLeave()"
  (click)="openModal()"
  role="button"
  tabindex="0"
  [attr.aria-label]="'Ver detalhes de ' + project.title"
  (keydown.enter)="openModal()"
  (keydown.space)="openModal()"
>

  <div class="card-media">

    <img
      class="card-thumb"
      [src]="project.thumbnail"
      [alt]="project.title"
      loading="lazy"
    />

    <img
      *ngIf="isGif"
      class="card-preview card-preview--gif"
      [src]="hovered() ? project.preview : ''"
      [attr.data-src]="project.preview"
      [alt]="project.title + ' preview'"
      aria-hidden="true"
    />

    <video
      *ngIf="isVideo"
      #videoRef
      class="card-preview card-preview--video"
      [src]="project.preview"
      muted
      loop
      playsinline
      preload="none"
      aria-hidden="true"
    ></video>

    <div class="card-gradient"></div>
  </div>

  <!-- ─── Category badge ─────────────────────────────── -->
  <span class="category-pill">{{ project.category }}</span>

  <!-- ─── Preview hint ──────────────────────────────── -->
  <div class="preview-hint" *ngIf="hasPreview && !hovered()" aria-hidden="true">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5,3 19,12 5,21"/>
    </svg>
    Preview
  </div>

  <!-- ─── Click-to-open hint (sem preview) ──────────── -->
  <div class="open-hint" *ngIf="!hasPreview && !hovered()" aria-hidden="true">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Details
  </div>

  <!-- ─── Overlay de informações ────────────────────── -->
  <div class="card-overlay" [@overlayReveal]="hovered() ? 'hovered' : 'idle'">
    <div class="overlay-body">

      <h3 class="project-title">{{ project.title }}</h3>
      <p class="project-desc">{{ project.description }}</p>

      <div class="tech-list">
        <span class="tech-tag" *ngFor="let t of project.technologies">{{ t }}</span>
      </div>

      <!-- Botões param propagação para não disparar openModal() -->
      <div class="card-actions">
        <a
          [href]="project.githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-outline"
          (click)="$event.stopPropagation()"
        >
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          GitHub
        </a>

        <a *ngIf="project.demoUrl"
          [href]="project.demoUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-primary"
          (click)="$event.stopPropagation()"
        >
          Live Demo
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15,3 21,3 21,9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>

        <!-- Botão de detalhe no overlay -->
        <button
          class="btn btn-details"
          (click)="$event.stopPropagation(); openModal()"
          aria-label="Ver detalhes"
        >
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Details
        </button>
      </div>

    </div>
  </div>

</div>
